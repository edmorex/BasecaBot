<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BasecaBot — Sample Game</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; background: #0e0e10; color: #efeff1; }
      h1 { color: #a970ff; }
      .panel { background: #18181b; border: 1px solid #2a2a2d; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
      input, button { font-size: 1rem; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #3a3a3d; }
      button { background: #a970ff; color: #fff; border: none; cursor: pointer; }
      button:hover { background: #9147ff; }
      table { width: 100%; border-collapse: collapse; }
      td, th { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #2a2a2d; }
      .status { font-size: 0.9rem; color: #adadb8; }
      .bar { height: 10px; background: #a970ff; border-radius: 5px; }
    </style>
  </head>
  <body>
    <h1>Sample Game — live vote</h1>

    <div class="panel">
      <label class="status">Hub URL
        <input id="url" size="46" value="ws://localhost:8080?room=sample-game&secret=change-me" />
      </label>
      <button id="connect">Connect</button>
      <span id="status" class="status">disconnected</span>
    </div>

    <div class="panel">
      <h2>Votes</h2>
      <table>
        <thead><tr><th>Option</th><th>Count</th><th></th></tr></thead>
        <tbody id="tally"></tbody>
      </table>
    </div>

    <div class="panel">
      <button id="declare">Declare winner &amp; award points</button>
      <span class="status">Sends a "result" back to the bot, which announces it in chat.</span>
    </div>

    <script>
      const tally = new Map(); // option -> { count, lastUser, lastUserId }
      let ws = null;

      const $ = (id) => document.getElementById(id);

      // When served over HTTPS (production behind Caddy), default to secure wss
      // via the reverse proxy. Locally (file://) keep the ws://localhost default.
      if (location.protocol === 'https:') {
        $('url').value = `wss://${location.host}/ws?room=sample-game&secret=change-me`;
      }
      const setStatus = (t) => ($('status').textContent = t);

      function render() {
        const rows = [...tally.entries()].sort((a, b) => b[1].count - a[1].count);
        const max = rows[0]?.[1].count || 1;
        $('tally').innerHTML = rows
          .map(
            ([opt, v]) =>
              `<tr><td>${opt}</td><td>${v.count}</td><td><div class="bar" style="width:${(v.count / max) * 100}%"></div></td></tr>`,
          )
          .join('');
      }

      function send(type, payload) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type, room: 'sample-game', payload }));
        }
      }

      $('connect').onclick = () => {
        if (ws) ws.close();
        ws = new WebSocket($('url').value);
        ws.onopen = () => setStatus('connected');
        ws.onclose = () => setStatus('disconnected');
        ws.onerror = () => setStatus('error (check secret/port)');
        ws.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'gameStart') {
            tally.clear();
            render();
            setStatus('game started');
          } else if (msg.type === 'vote') {
            const opt = String(msg.payload.option);
            const cur = tally.get(opt) || { count: 0 };
            cur.count++;
            cur.lastUser = msg.payload.user;
            cur.lastUserId = msg.payload.userId;
            tally.set(opt, cur);
            render();
          } else if (msg.type === 'gameEnd') {
            setStatus('game ended');
          }
        };
      };

      $('declare').onclick = () => {
        const rows = [...tally.entries()].sort((a, b) => b[1].count - a[1].count);
        const top = rows[0];
        if (!top) return;
        // The winner is the last voter for the winning option (simple demo rule).
        send('result', { winner: top[1].lastUser, winnerUserId: top[1].lastUserId });
        setStatus(`declared winner: ${top[0]}`);
      };
    </script>
  </body>
</html>
