# BasecaBot — bot service only.
#
# TLS/HTTPS and static web-app serving are handled by the separate `edge-server`
# project, which owns ports 80/443. It reaches this bot over the shared external
# `edge` Docker network and proxies wss://bot.edmorex.com/ws -> bot:8080.
# (See docs/DEPLOYMENT.md and docs/edge-server-spec.md.)
#
# Data lives in named volumes so it survives `docker compose up --build` and
# reboots:
#   botdata    -> /data          (SQLite database)
#   bottokens  -> /app/.tokens    (refreshed Twitch tokens)
#
# NOTE: this uses SQLite on a volume — perfect for a single always-on bot with no
# extra moving parts. Moving to Postgres later is a schema `provider` change plus
# a fresh migration; see docs/DEPLOYMENT.md.

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Absolute path on the mounted volume. Overrides the local .env value so
      # migrations aren't shadowed (prisma/migrations stays baked in the image).
      DATABASE_URL: file:/data/basecabot.db
      NODE_ENV: production
    volumes:
      - botdata:/data
      - bottokens:/app/.tokens
    expose:
      - '8080' # WebSocket hub — reached by the edge Caddy over the `edge` network
      - '8090' # HTTP server (dashboard + OAuth + API) — also via the edge Caddy
    networks:
      - edge

volumes:
  botdata:
  bottokens:

networks:
  # Shared with the edge-server project. Create once on the host with:
  #   docker network create edge
  edge:
    external: true
